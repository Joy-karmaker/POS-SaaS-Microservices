name: pos-saas-microservices

services:
  mysql:
    image: mysql:8.4
    container_name: pos-mysql
    command: ["--mysql-native-password=ON"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - pos-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    networks:
      - pos-network

  redis:
    image: redis:7.4-alpine
    container_name: pos-redis
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - pos-network

  tenant-service:
    build:
      context: ./services/tenant-service-laravel
    container_name: tenant-service
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost/tenant
      APP_KEY: ${TENANT_SERVICE_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SESSION_DRIVER: file
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE}
      AUTH_JWT_ACCESS_TTL: ${AUTH_JWT_ACCESS_TTL}
      AUTH_JWT_REFRESH_TTL: ${AUTH_JWT_REFRESH_TTL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_CONNECTION_TIMEOUT: ${RABBITMQ_CONNECTION_TIMEOUT}
      RABBITMQ_READ_WRITE_TIMEOUT: ${RABBITMQ_READ_WRITE_TIMEOUT}
      RABBITMQ_HEARTBEAT: ${RABBITMQ_HEARTBEAT}
      RABBITMQ_KEEPALIVE: ${RABBITMQ_KEEPALIVE}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_EXCHANGE_TYPE: ${RABBITMQ_EXCHANGE_TYPE}
      RABBITMQ_DLX: ${RABBITMQ_DLX}
      RABBITMQ_ROUTING_SHIFT_CLOSED: ${RABBITMQ_ROUTING_SHIFT_CLOSED}
      RABBITMQ_ROUTING_SHIFT_CLOSED_DLQ: ${RABBITMQ_ROUTING_SHIFT_CLOSED_DLQ}
      RABBITMQ_QUEUE_SHIFT_CLOSED_AUDIT: ${RABBITMQ_QUEUE_SHIFT_CLOSED_AUDIT}
      RABBITMQ_QUEUE_SHIFT_CLOSED_DLQ: ${RABBITMQ_QUEUE_SHIFT_CLOSED_DLQ}
      RABBITMQ_PUBLISH_FAIL_HARD: ${RABBITMQ_PUBLISH_FAIL_HARD}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    expose:
      - "8080"
    networks:
      - pos-network

  auth-service:
    build:
      context: ./services/auth-service-laravel
    container_name: auth-service
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost/auth
      APP_KEY: ${AUTH_SERVICE_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SESSION_DRIVER: file
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE}
      AUTH_JWT_ACCESS_TTL: ${AUTH_JWT_ACCESS_TTL}
      AUTH_JWT_REFRESH_TTL: ${AUTH_JWT_REFRESH_TTL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_CONNECTION_TIMEOUT: ${RABBITMQ_CONNECTION_TIMEOUT}
      RABBITMQ_READ_WRITE_TIMEOUT: ${RABBITMQ_READ_WRITE_TIMEOUT}
      RABBITMQ_HEARTBEAT: ${RABBITMQ_HEARTBEAT}
      RABBITMQ_KEEPALIVE: ${RABBITMQ_KEEPALIVE}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_EXCHANGE_TYPE: ${RABBITMQ_EXCHANGE_TYPE}
      RABBITMQ_DLX: ${RABBITMQ_DLX}
      RABBITMQ_ROUTING_SHIFT_CLOSED: ${RABBITMQ_ROUTING_SHIFT_CLOSED}
      RABBITMQ_ROUTING_SHIFT_CLOSED_DLQ: ${RABBITMQ_ROUTING_SHIFT_CLOSED_DLQ}
      RABBITMQ_QUEUE_SHIFT_CLOSED_AUDIT: ${RABBITMQ_QUEUE_SHIFT_CLOSED_AUDIT}
      RABBITMQ_QUEUE_SHIFT_CLOSED_DLQ: ${RABBITMQ_QUEUE_SHIFT_CLOSED_DLQ}
      RABBITMQ_PUBLISH_FAIL_HARD: ${RABBITMQ_PUBLISH_FAIL_HARD}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    expose:
      - "8080"
    networks:
      - pos-network

  gateway:
    image: nginx:1.27-alpine
    container_name: api-gateway
    ports:
      - "${GATEWAY_PORT}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - auth-service
      - tenant-service
    networks:
      - pos-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pos-frontend
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE: ${VITE_API_BASE}
      VITE_GATEWAY_PROXY_TARGET: ${VITE_GATEWAY_PROXY_TARGET}
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - gateway
    networks:
      - pos-network

networks:
  pos-network:
    driver: bridge

volumes:
  mysql-data:
  frontend-node-modules: